<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carte interactive Pixi.js</title>
  <style>
    html, body {
      margin: 0; padding: 0; overflow: hidden; height: 100%;
      background: #1e1e1e;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }
    #map-ui {
      position: absolute;
      bottom: 10px;
      right: 10px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
      pointer-events: none; /* éviter d'interférer avec la carte */
    }
    #minimap {
      width: 150px;
      height: 100px;
      background: rgba(255,255,255,0.1);
      border: 1px solid #aaa;
      pointer-events: auto;
    }
    #zoom-controls {
      position: absolute;
      bottom: 10px;
      left: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
      pointer-events: auto;
    }
    #zoom-controls button {
      font-size: 1.5rem;
      padding: 5px 10px;
      cursor: pointer;
      background: #333;
      color: white;
      border: none;
      border-radius: 4px;
      user-select: none;
    }
    #zoom-controls button:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="map-ui">
    <div id="minimap"></div>
  </div>

  <div id="zoom-controls">
    <button id="zoom-in">+</button>
    <button id="zoom-out">−</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.2.4/pixi.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
