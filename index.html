<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carte interactive Pixi.js</title>
  <style>
    html, body {
      margin: 0; padding: 0; overflow: hidden; height: 100%;
      background: #1e1e1e;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }
    #map-ui {
      position: absolute;
      bottom: 10px;
      right: 10px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
      pointer-events: none; /* éviter d'interférer avec la carte */
    }
    #minimap {
      display: block;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 3px;
      pointer-events: auto;
      cursor: crosshair;
    }
    #zoom-controls {
      position: absolute;
      bottom: 10px;
      left: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
      pointer-events: auto;
    }
    #zoom-controls button {
      font-size: 1.5rem;
      padding: 5px 10px;
      cursor: pointer;
      background: #333;
      color: white;
      border: none;
      border-radius: 4px;
      user-select: none;
    }
    #zoom-controls button:hover {
      background: #555;
    }

    /* --- Panel POI --- */
    #poi-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 380px;
      height: 100%;
      background: #1a1a1a;
      color: #eee;
      z-index: 100;
      overflow-y: auto;
      padding: 32px 24px 24px;
      box-sizing: border-box;
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }
    #poi-panel.open {
      transform: translateX(0);
    }
    #poi-close {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
    }
    #poi-close:hover { color: #fff; }
    #poi-content img {
      width: 100%;
      border-radius: 4px;
      margin-bottom: 16px;
    }
    #poi-content h1 { font-size: 1.3rem; margin: 0 0 12px; color: #fff; }
    #poi-content h2 { font-size: 1rem; margin: 20px 0 8px; color: #ccc; }
    #poi-content p  { font-size: 0.9rem; line-height: 1.6; color: #bbb; margin: 0 0 12px; }
    #poi-content ul { padding-left: 18px; color: #bbb; font-size: 0.9rem; line-height: 1.8; }
    #poi-content a  { color: #7eb8f7; }

    @media (max-width: 768px) {
      #poi-panel { width: 90vw; }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="map-ui">
    <canvas id="minimap"></canvas>
  </div>

  <div id="zoom-controls">
    <button id="zoom-in">+</button>
    <button id="zoom-out">−</button>
  </div>

  <div id="poi-panel">
    <button id="poi-close">✕</button>
    <div id="poi-content"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.2.4/pixi.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
